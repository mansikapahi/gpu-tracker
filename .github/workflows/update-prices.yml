name: update-prices

on:
  schedule:
    - cron: "17 5,17 * * *"   # twice daily, off the whole hour to avoid GH congestion
  workflow_dispatch: {}        # manual runs from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run scrapers
        run: python scrapers/run_all.py

      - name: Build GPU pages + sitemap
        run: python scrapers/build_site.py

      - name: Commit updated data
        run: |
          git config user.name "price-bot"
          git config user.email "actions@github.com"
          git add site
          git diff --cached --quiet && echo "No price changes" && exit 0
          git commit -m "prices: $(date -u +%F' '%H:%M) UTC"
          git push
